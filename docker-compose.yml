# TickTick MCP Server — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in your credentials:
#        cp .env.example .env
#   2. Start the server:
#        docker-compose up -d
#   3. The MCP endpoint will be available at:
#        http://localhost:8000/mcp
#   4. Health check:
#        curl http://localhost:8000/health

services:
  ticktick-mcp:
    build: .
    container_name: ticktick-mcp
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"

    # Credentials and settings are loaded from the .env file.
    # See .env.example for all available variables.
    env_file:
      - .env

    # These environment variables are required for Docker HTTP mode
    # and should NOT be changed unless you know what you're doing.
    environment:
      - TICKTICK_TRANSPORT=http        # Use HTTP transport (not stdio)
      - FASTMCP_STATELESS_HTTP=false   # Keep session state across requests
      - PORT=8000                      # Internal container port

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
